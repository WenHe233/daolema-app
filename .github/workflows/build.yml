name: Build Check

on:
  pull_request:
  push:
    branches-ignore: [main]

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated Drift code
        shell: bash
        run: |
          dart run build_runner build
          git diff --exit-code -- lib/data/db/database.g.dart

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
